name: Chequear La Odisea en Showcase

on:
  schedule:
    # GitHub Actions tiene un mínimo de 5 minutos.
    # Con dos schedules intercalados logramos ~cada 10 min.
    - cron: "*/10 * * * *"   # cada 10 minutos
  workflow_dispatch:          # también se puede correr manualmente desde GitHub

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr el scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: python check_odisea.py
